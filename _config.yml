# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: XX科技
subtitle: 绿色能源，照亮未来
description: 专注于新能源光伏板和新能源电池研发制造的高新技术企业，为全球提供清洁能源解决方案
keywords: 新能源, 光伏板, 太阳能电池, 储能电池, 光伏发电, 清洁能源, 绿色能源
author: XX科技
language: 
  - zh-CN
  - zh-TW
  - en
  - ja
default_language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://alien-et.github.io
permalink: news/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: news
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: company
category_map:
  company: company
  industry: industry
  tech: tech
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: enterprise

# Deployment
deploy:
  type: git
  repo: https://github.com/Alien-Et/Alien-Et.github.io.git
  branch: gh-pages
