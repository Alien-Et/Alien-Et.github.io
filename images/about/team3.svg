<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ee0979;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6a00;stop-opacity:1" />
    </linearGradient>
    <clipPath id="avatarClip3">
      <circle cx="100" cy="100" r="80"/>
    </clipPath>
  </defs>
  <rect width="200" height="200" fill="url(#bg3)" rx="10"/>
  <g clip-path="url(#avatarClip3)">
    <!-- Face -->
    <circle cx="100" cy="100" r="60" fill="#fbd3b4"/>
    <!-- Hair -->
    <path d="M40 70 Q100 35 160 70 Q160 100 140 120 Q100 140 60 120 Q40 100 40 70" fill="#5d4037"/>
    <!-- Eyes -->
    <ellipse cx="80" cy="90" rx="8" ry="6" fill="white"/>
    <ellipse cx="120" cy="90" rx="8" ry="6" fill="white"/>
    <circle cx="80" cy="90" r="4" fill="#333"/>
    <circle cx="120" cy="90" r="4" fill="#333"/>
    <!-- Eye highlights -->
    <circle cx="79" cy="89" r="1.5" fill="white"/>
    <circle cx="119" cy="89" r="1.5" fill="white"/>
    <!-- Eyebrows -->
    <path d="M70 80 Q80 75 85 77" stroke="#5d4037" stroke-width="2" fill="none"/>
    <path d="M115 77 Q120 75 130 80" stroke="#5d4037" stroke-width="2" fill="none"/>
    <!-- Nose -->
    <path d="M100 95 Q105 100 100 105" stroke="#f0b994" stroke-width="2" fill="none"/>
    <!-- Mouth -->
    <path d="M90 115 Q100 122 110 115" stroke="#d96aa3" stroke-width="2" fill="none"/>
    <!-- Earrings -->
    <circle cx="65" cy="100" r="4" fill="#ffd700" stroke="#d4af37" stroke-width="1"/>
    <circle cx="135" cy="100" r="4" fill="#ffd700" stroke="#d4af37" stroke-width="1"/>
  </g>
  <text x="100" y="195" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">COO</text>
</svg>