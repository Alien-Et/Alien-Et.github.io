<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="buildingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb700;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0044aa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="400" height="300" fill="#e3f2fd"/>
  
  <!-- Sun -->
  <circle cx="350" cy="60" r="25" fill="url(#sunGrad)" opacity="0.8"/>
  <g stroke="#ffb700" stroke-width="2" opacity="0.5">
    <line x1="350" y1="20" x2="350" y2="10" />
    <line x1="380" y1="60" x2="390" y2="60" />
    <line x1="350" y1="100" x2="350" y2="110" />
    <line x1="320" y1="60" x2="310" y2="60" />
    <line x1="371" y1="39" x2="378" y2="32" />
    <line x1="378" y1="81" x2="385" y2="88" />
    <line x1="322" y1="39" x2="315" y2="32" />
    <line x1="322" y1="81" x2="315" y2="88" />
  </g>
  
  <!-- Building -->
  <rect x="100" y="100" width="200" height="120" fill="url(#buildingGrad)" stroke="#adb5bd" stroke-width="1"/>
  <rect x="110" y="110" width="180" height="20" fill="#f1f3f5"/>
  
  <!-- Windows -->
  <g fill="#e3f2fd" stroke="#90a4ae" stroke-width="0.5">
    <rect x="120" y="140" width="20" height="25"/>
    <rect x="150" y="140" width="20" height="25"/>
    <rect x="180" y="140" width="20" height="25"/>
    <rect x="210" y="140" width="20" height="25"/>
    <rect x="240" y="140" width="20" height="25"/>
    <rect x="120" y="175" width="20" height="25"/>
    <rect x="150" y="175" width="20" height="25"/>
    <rect x="180" y="175" width="20" height="25"/>
    <rect x="210" y="175" width="20" height="25"/>
    <rect x="240" y="175" width="20" height="25"/>
  </g>
  
  <!-- Solar panels on roof -->
  <g transform="translate(120, 80)">
    <rect x="0" y="0" width="160" height="15" fill="url(#panelGrad)" stroke="#0d47a1" stroke-width="0.5"/>
    <line x1="0" y1="5" x2="160" y2="5" stroke="#1976d2" stroke-width="0.5" opacity="0.5"/>
    <line x1="0" y1="10" x2="160" y2="10" stroke="#1976d2" stroke-width="0.5" opacity="0.5"/>
    <rect x="5" y="2" width="15" height="2" fill="#ffd600"/>
    <rect x="25" y="2" width="15" height="2" fill="#ffd600"/>
    <rect x="45" y="2" width="15" height="2" fill="#ffd600"/>
    <rect x="65" y="2" width="15" height="2" fill="#ffd600"/>
    <rect x="85" y="2" width="15" height="2" fill="#ffd600"/>
    <rect x="105" y="2" width="15" height="2" fill="#ffd600"/>
    <rect x="125" y="2" width="15" height="2" fill="#ffd600"/>
    <rect x="145" y="2" width="15" height="2" fill="#ffd600"/>
  </g>
  
  <!-- Door -->
  <rect x="185" y="180" width="30" height="40" fill="#78909c" stroke="#546e7a" stroke-width="1"/>
  <circle cx="210" cy="200" r="2" fill="#ffd600"/>
  
  <!-- Ground -->
  <rect x="0" y="220" width="400" height="80" fill="url(#grassGrad)"/>
  
  <!-- Trees -->
  <rect x="50" y="190" width="8" height="30" fill="#5d4037"/>
  <circle cx="54" cy="180" r="20" fill="#4caf50" opacity="0.8"/>
  
  <rect x="340" y="195" width="6" height="25" fill="#5d4037"/>
  <circle cx="343" cy="185" r="15" fill="#4caf50" opacity="0.8"/>
  
  <!-- Company Logo -->
  <rect x="160" y="40" width="80" height="30" rx="5" fill="#0066cc" opacity="0.9"/>
  <text x="200" y="60" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">XX科技</text>
</svg>