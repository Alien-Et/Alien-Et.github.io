<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f6ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0044aa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#795548;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5d4037;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="200" fill="url(#skyGrad)"/>
  
  <!-- Sun -->
  <circle cx="350" cy="50" r="20" fill="#ffeb3b"/>
  <g stroke="#ffc107" stroke-width="2" opacity="0.6">
    <line x1="350" y1="25" x2="350" y2="15" />
    <line x1="375" y1="50" x2="385" y2="50" />
    <line x1="350" y1="75" x2="350" y2="85" />
    <line x1="325" y1="50" x2="315" y2="50" />
    <line x1="365" y1="35" x2="372" y2="28" />
    <line x1="365" y1="65" x2="372" y2="72" />
    <line x1="335" y1="35" x2="328" y2="28" />
    <line x1="335" y1="65" x2="328" y2="72" />
  </g>
  
  <!-- Ground -->
  <rect x="0" y="150" width="400" height="50" fill="#8bc34a"/>
  
  <!-- Solar Panel Array -->
  <g transform="translate(100, 80)">
    <!-- Mounting Structure -->
    <rect x="0" y="30" width="200" height="5" fill="url(#mountGrad)" rx="2"/>
    <rect x="25" y="20" width="5" height="15" fill="url(#mountGrad)" rx="1"/>
    <rect x="75" y="20" width="5" height="15" fill="url(#mountGrad)" rx="1"/>
    <rect x="125" y="20" width="5" height="15" fill="url(#mountGrad)" rx="1"/>
    <rect x="175" y="20" width="5" height="15" fill="url(#mountGrad)" rx="1"/>
    
    <!-- Solar Panels -->
    <g>
      <rect x="10" y="0" width="40" height="30" fill="url(#panelGrad)" stroke="#0d47a1" stroke-width="0.5"/>
      <line x1="10" y1="10" x2="50" y2="10" stroke="#1976d2" stroke-width="0.5" opacity="0.5"/>
      <line x1="10" y1="20" x2="50" y2="20" stroke="#1976d2" stroke-width="0.5" opacity="0.5"/>
      <rect x="15" y="3" width="8" height="2" fill="#ffd600"/>
      <rect x="28" y="3" width="8" height="2" fill="#ffd600"/>
      
      <rect x="60" y="0" width="40" height="30" fill="url(#panelGrad)" stroke="#0d47a1" stroke-width="0.5"/>
      <line x1="60" y1="10" x2="100" y2="10" stroke="#1976d2" stroke-width="0.5" opacity="0.5"/>
      <line x1="60" y1="20" x2="100" y2="20" stroke="#1976d2" stroke-width="0.5" opacity="0.5"/>
      <rect x="65" y="3" width="8" height="2" fill="#ffd600"/>
      <rect x="78" y="3" width="8" height="2" fill="#ffd600"/>
      
      <rect x="110" y="0" width="40" height="30" fill="url(#panelGrad)" stroke="#0d47a1" stroke-width="0.5"/>
      <line x1="110" y1="10" x2="150" y2="10" stroke="#1976d2" stroke-width="0.5" opacity="0.5"/>
      <line x1="110" y1="20" x2="150" y2="20" stroke="#1976d2" stroke-width="0.5" opacity="0.5"/>
      <rect x="115" y="3" width="8" height="2" fill="#ffd600"/>
      <rect x="128" y="3" width="8" height="2" fill="#ffd600"/>
      
      <rect x="160" y="0" width="40" height="30" fill="url(#panelGrad)" stroke="#0d47a1" stroke-width="0.5"/>
      <line x1="160" y1="10" x2="200" y2="10" stroke="#1976d2" stroke-width="0.5" opacity="0.5"/>
      <line x1="160" y1="20" x2="200" y2="20" stroke="#1976d2" stroke-width="0.5" opacity="0.5"/>
      <rect x="165" y="3" width="8" height="2" fill="#ffd600"/>
      <rect x="178" y="3" width="8" height="2" fill="#ffd600"/>
    </g>
  </g>
  
  <!-- Title -->
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="16" fill="#0d47a1" text-anchor="middle" font-weight="bold">高效太阳能板发布</text>
  <text x="200" y="45" font-family="Arial, sans-serif" font-size="12" fill="#546e7a" text-anchor="middle">High-Efficiency Solar Panel Launch</text>
</svg>