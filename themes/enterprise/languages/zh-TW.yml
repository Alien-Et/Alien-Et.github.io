  desc:
    solar: 高效單晶硅光伏板
    battery: 磷酸鐵鋰儲能系統
    station: 分佈式光伏電站解決方案
    smart: 智能能源管理系統
  solar:
    desc: XX科技G系列光伏組件採用先進的PERC電池技術和半片封裝工藝，組件轉換效率突破23%%，達到行業領先水平。產品涵蓋單晶、多晶、雙面雙玻等多種類型，滿足不同應用場景需求。
    feature1: 轉換效率高達23%%+
    feature2: 30年線性功率質保
    feature3: 抗PID、抗LETID技術
    feature4: 通過TUV、UL、CE認證
  battery:
    desc: XX科技儲能系統採用安全可靠的磷酸鐵鋰(LFP)電池技術，循環壽命超過6000次，日歷壽命達15年以上。產品覆蓋戶用儲能、工商業儲能、大型儲能電站等多種應用場景。
    feature1: 循環壽命6000次以上
    feature2: 智能BMS管理系統
    feature3: 模組化設計，靈活擴展
    feature4: 10年質保服務
  station:
    desc: 提供從專案規劃、方案設計、設備供應、工程建設到運維管理的全流程服務。涵蓋戶用分佈式、工商業分佈式、地面電站等多種類型，累計裝機容量超過5GW。
    feature1: 全流程一站式服務
    feature2: 專業設計團隊
    feature3: 智能運維平台
    feature4: 25年發電保障
  smart:
    desc: 基於物聯網和人工智能技術的智慧能源管理平台，實現光伏發電、儲能調度、用電管理的智能化運營。通過大數據分析優化能源使用效率，降低用電成本。
    feature1: 實時監控與預警
    feature2: AI智能調度算法
    feature3: 多終端數據同步
    feature4: 能效分析報告
  process:
    title: 服務流程
    subtitle: 專業服務，全程保障
