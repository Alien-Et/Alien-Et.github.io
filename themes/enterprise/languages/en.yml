    smart: Smart Energy
  desc:
    solar: High-efficiency monocrystalline solar panels
    battery: LiFePO4 energy storage system
    station: Distributed solar power plant solutions
    smart: Intelligent energy management system
  solar:
    desc: XX Technology G series photovoltaic modules adopt advanced PERC cell technology and half-cell packaging process, with module conversion efficiency exceeding 23%%, reaching industry-leading level. Products cover monocrystalline, polycrystalline, bifacial double-glass and other types to meet different application scenarios.
    feature1: Conversion efficiency up to 23%%+
    feature2: 30-year linear power warranty
    feature3: Anti-PID, anti-LETID technology
    feature4: Passed TUV, UL, CE certification
  battery:
    desc: XX Technology energy storage system adopts safe and reliable lithium iron phosphate (LFP) battery technology, with cycle life exceeding 6000 times and calendar life up to 15 years. Products cover household energy storage, commercial and industrial energy storage, large-scale energy storage power stations and other application scenarios.
    feature1: Cycle life over 6000 times
    feature2: Intelligent BMS management system
    feature3: Modular design, flexible expansion
    feature4: 10-year warranty service
  station:
    desc: Providing full-process services from project planning, scheme design, equipment supply, engineering construction to operation and maintenance management. Covering household distributed, commercial and industrial distributed, ground power station and other types, with cumulative installed capacity exceeding 5GW.
    feature1: Full-process one-stop service
    feature2: Professional design team
    feature3: Intelligent operation and maintenance platform
    feature4: 25-year power generation guarantee
  smart:
    desc: Intelligent energy management platform based on Internet of Things and artificial intelligence technology, realizing intelligent operation of photovoltaic power generation, energy storage dispatching and power consumption management. Optimize energy use efficiency and reduce electricity costs through big data analysis.
    feature1: Real-time monitoring and early warning
    feature2: AI intelligent dispatching algorithm
    feature3: Multi-terminal data synchronization
    feature4: Energy efficiency analysis report
