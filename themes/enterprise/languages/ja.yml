  desc:
    solar: 高効率単結晶シリコン太陽光パネル
    battery: リン酸鉄リチウム蓄電システム
    station: 分散型太陽光発電所ソリューション
    smart: インテリジェントエネルギー管理システム
  solar:
    desc: XX科技Gシリーズ太陽光モジュールは、最先端のPERCセル技術とハーフセルパッケージングプロセスを採用し、モジュール変換効率は23%%を超え、業界をリードするレベルに到達しています。製品は単結晶、多結晶、両面ダブルガラスなど多くのタイプをカバーし、異なる応用シナリオのニーズを満たします。
    feature1: 変換効率は23%%+に達する
    feature2: 30年間の直線的電力保証
    feature3: PID対策、LETID対策技術
    feature4: TUV、UL、CE認証取得
  battery:
    desc: XX科技のエネルギー貯蔵システムは、安全で信頼性の高いリン酸鉄リチウム（LFP）バッテリー技術を採用し、サイクル寿命は6000回を超え、カレンダー寿命は15年以上に達します。製品は家庭用エネルギー貯蔵、商業・産業用エネルギー貯蔵、大規模エネルギー貯蔵発電所など多くの応用シナリオをカバーしています。
    feature1: サイクル寿命は6000回以上
    feature2: インテリジェントBMS管理システム
    feature3: モジュラー設計、柔軟な拡張
    feature4: 10年間の保証サービス
  station:
    desc: プロジェクト計画、計画設計、機器供給、工事建設から運用管理までの全工程サービスを提供します。家庭用分散型、商業・産業用分散型、地上発電所など多くのタイプをカバーし、累計設置容量は5GWを超えています。
    feature1: 全工程ワンストップサービス
    feature2: 専門設計チーム
    feature3: インテリジェント運用管理プラットフォーム
    feature4: 25年間の発電保証
  smart:
    desc: モノのインターネットと人工知能技術に基づくスマートエネルギー管理プラットフォームで、太陽光発電、エネルギー貯蔵調度、電力使用管理のインテリジェント運用を実現します。ビッグデータ分析を通じてエネルギー使用効率を最適化し、電力コストを削減します。
    feature1: リアルタイムモニタリングと予告警報
    feature2: AIインテリジェントディスパッチアルゴリズム
    feature3: マルチターミナルデータ同期
    feature4: エネルギー効率分析レポート
  process:
    title: サービスプロセス
    subtitle: 専門的なサービス、フルサポート
    step1:
      title: ニーズコミュニケーション
      desc: 顧客の電力ニーズとサイト条件を深く理解する
    step2:
