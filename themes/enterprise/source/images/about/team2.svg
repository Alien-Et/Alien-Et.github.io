<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <clipPath id="avatarClip2">
      <circle cx="100" cy="100" r="80"/>
    </clipPath>
  </defs>
  <rect width="200" height="200" fill="url(#bg2)" rx="10"/>
  <g clip-path="url(#avatarClip2)">
    <!-- Face -->
    <circle cx="100" cy="100" r="60" fill="#f4c89d"/>
    <!-- Hair -->
    <path d="M40 70 Q100 30 160 70 Q160 100 140 120 Q100 140 60 120 Q40 100 40 70" fill="#2c3e50"/>
    <!-- Eyes -->
    <ellipse cx="80" cy="90" rx="8" ry="6" fill="white"/>
    <ellipse cx="120" cy="90" rx="8" ry="6" fill="white"/>
    <circle cx="80" cy="90" r="4" fill="#333"/>
    <circle cx="120" cy="90" r="4" fill="#333"/>
    <!-- Eye highlights -->
    <circle cx="79" cy="89" r="1.5" fill="white"/>
    <circle cx="119" cy="89" r="1.5" fill="white"/>
    <!-- Eyebrows -->
    <path d="M70 80 Q80 75 85 77" stroke="#2c3e50" stroke-width="2" fill="none"/>
    <path d="M115 77 Q120 75 130 80" stroke="#2c3e50" stroke-width="2" fill="none"/>
    <!-- Nose -->
    <path d="M100 95 Q105 100 100 105" stroke="#eac2a0" stroke-width="2" fill="none"/>
    <!-- Mouth -->
    <path d="M90 115 Q100 120 110 115" stroke="#d96aa3" stroke-width="2" fill="none"/>
    <!-- Beard -->
    <path d="M70 120 Q100 130 130 120 Q130 130 125 135 Q100 140 75 135 Q70 130 70 120" fill="#2c3e50" opacity="0.7"/>
  </g>
  <text x="100" y="195" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">CTO</text>
</svg>